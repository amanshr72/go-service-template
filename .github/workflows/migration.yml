name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
      migration_type:
        description: "What to run (prod DDL needs approval)"
        required: true
        type: choice
        options:
          - dml-only
          - ddl-then-dml

jobs:
  # ── Stage: DDL + DML in one job, same container ───────────────────────────
  migrate-stage:
    if: inputs.environment == 'stage'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: gocrud2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run DDL migrations
        if: inputs.migration_type == 'ddl-then-dml'
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: "host=localhost user=postgres password=postgres123 dbname=gocrud2_test sslmode=disable"
          APP_ENV: stage
        run: go run cmd/migrate/main.go ddl up

      - name: Run DML migrations
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: "host=localhost user=postgres password=postgres123 dbname=gocrud2_test sslmode=disable"
          APP_ENV: stage
        run: go run cmd/migrate/main.go dml up

  # ── Prod DDL: approval gate, separate job ─────────────────────────────────
  migrate-prod-ddl:
    if: inputs.environment == 'prod' && inputs.migration_type == 'ddl-then-dml'
    runs-on: ubuntu-latest
    environment: prod-ddl       # this is where approval lives in GitHub settings
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: gocrud2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run DDL migrations
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: "host=localhost user=postgres password=postgres123 dbname=gocrud2_test sslmode=disable"
          APP_ENV: prod
        run: go run cmd/migrate/main.go ddl up

  # ── Prod DML: runs after DDL approved+done, or standalone ─────────────────
  migrate-prod-dml:
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    needs: [migrate-prod-ddl]
    # if ddl job was skipped (dml-only), still run. if ddl failed, don't run.
    if: |
      inputs.environment == 'prod' &&
      (needs.migrate-prod-ddl.result == 'success' || needs.migrate-prod-ddl.result == 'skipped')
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: gocrud2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run DML migrations
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: "host=localhost user=postgres password=postgres123 dbname=gocrud2_test sslmode=disable"
          APP_ENV: prod
        run: go run cmd/migrate/main.go dml up