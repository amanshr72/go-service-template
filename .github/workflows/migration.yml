name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod

jobs:
  migrate:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Stage DDL + DML
        if: inputs.environment == 'stage'
        env:
          GOOSE_DBSTRING: ${{ secrets.STAGE_DB_URL }}
        run: |
          go run cmd/migrate/main.go ddl up
          go run cmd/migrate/main.go dml up

      - name: Run Prod DML
        if: inputs.environment == 'prod'
        env:
          GOOSE_DBSTRING: ${{ secrets.PROD_DB_URL }}
        run: |
          go run cmd/migrate/main.go dml up

      - name: Run Prod DDL
        if: inputs.environment == 'prod'
        env:
          GOOSE_DBSTRING: ${{ secrets.PROD_MIGRATION_DB_URL }}
        run: |
          go run cmd/migrate/main.go ddl up