version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive

  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true

        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
